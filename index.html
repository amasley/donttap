<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style/reset.css">
  <link rel="stylesheet" href="style/main.css">
  <script src="script/main.js" type="module" defer></script>
</head>
<body>
  <header id="game-header">
    <h1 id="game-title">Dont Tap The White Squares</h1>
    <div id="game-score">0</div>
    <div>Time: <span id="game-timer"></span></div>
  </header>
  <main>
    <div id="game-over">
      <h2 id="game-over-text">Game Over</h2>
      <p>High Score: <span id="high-score"></span></p>
      <button id="start-game" type="button">
        Start Game
      </button>
    </div>
    
    <div id="game-area">
      <div class="square" id="0" data-active="false"></div>
      <div class="square" id="1" data-active="false"></div>
      <div class="square" id="2" data-active="false"></div>
      <div class="square" id="3" data-active="false"></div>
      <div class="square" id="4" data-active="false"></div>
      <div class="square" id="5" data-active="false"></div>
      <div class="square" id="6" data-active="false"></div>
      <div class="square" id="7" data-active="false"></div>
      <div class="square" id="8" data-active="false"></div>
      <div class="square" id="9" data-active="false"></div>
      <div class="square" id="10" data-active="false"></div>
      <div class="square" id="11" data-active="false"></div>
      <div class="square" id="12" data-active="false"></div>
      <div class="square" id="13" data-active="false"></div>
      <div class="square" id="14" data-active="false"></div>
      <div class="square" id="15" data-active="false"></div>
    </div>
  </main>
</body>
</html>
